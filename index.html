<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تدريب البوت — ChatApp</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#262b36; --text:#eef1f6;
    --muted:#8a90a2; --accent:#5b8cff; --danger:#ff5b6e; --ok:#33c46a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:'Segoe UI', Tahoma, Arial, sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .wrap{width:100%; max-width:640px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:24px; margin-bottom:16px;
  }
  h1{font-size:20px; margin:0 0 4px;}
  p.sub{color:var(--muted); font-size:13px; margin:0 0 20px;}
  label{display:block; font-size:13px; color:var(--muted); margin:14px 0 6px;}
  input, textarea{
    width:100%; background:#0f1218; border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:10px 12px; font-size:14px; font-family:inherit;
  }
  textarea{resize:vertical; min-height:70px;}
  button{
    cursor:pointer; border:none; border-radius:8px; padding:10px 18px;
    font-size:14px; font-weight:600; font-family:inherit;
  }
  .btn-primary{background:var(--accent); color:#fff; width:100%; margin-top:18px;}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger); padding:6px 10px; font-size:12px;}
  .btn-logout{background:transparent; color:var(--muted); border:1px solid var(--border); font-size:12px; padding:6px 12px;}
  .err{color:var(--danger); font-size:13px; margin-top:10px; display:none;}
  .row-between{display:flex; align-items:center; justify-content:space-between;}
  .hidden{display:none !important;}
  .item{
    border:1px solid var(--border); border-radius:10px; padding:12px 14px;
    margin-top:10px; display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
  }
  .item .kw{color:var(--accent); font-size:12px; margin-bottom:4px;}
  .item .rp{font-size:14px; line-height:1.5;}
  .count{color:var(--muted); font-size:13px;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ok); color:#08240f; padding:10px 18px; border-radius:8px;
    font-size:13px; font-weight:600; opacity:0; transition:.25s; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="wrap">

  <!-- شاشة تسجيل الدخول -->
  <div class="card" id="loginCard">
    <h1>🔐 لوحة تدريب البوت</h1>
    <p class="sub">سجّل دخول بحساب الأدمن عشان تضيف أو تعدّل بيانات التدريب</p>
    <label>الإيميل</label>
    <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="username">
    <label>الباسورد</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- شاشة الإدارة (تظهر بعد تسجيل الدخول) -->
  <div class="card hidden" id="panelCard">
    <div class="row-between">
      <h1 style="margin:0;">📚 قاعدة معرفة البوت</h1>
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
    <p class="sub">عدد الأسئلة: <span class="count" id="qaCount">0</span></p>

    <label>الكلمات المفتاحية (افصل بفاصلة)</label>
    <input type="text" id="patternsInput" placeholder="مثال: الأسعار, بكام, تكلفة">
    <label>الرد</label>
    <textarea id="replyInput" placeholder="اكتب رد البوت هنا..."></textarea>
    <button class="btn-primary" id="saveBtn" onclick="addEntry()">➕ إضافة</button>
    <button class="btn-logout hidden" id="cancelEditBtn" style="width:100%;margin-top:8px;" onclick="cancelEdit()">إلغاء التعديل</button>

    <label style="margin-top:22px;">🔍 دوّر في الأسئلة المضافة</label>
    <input type="text" id="searchInput" placeholder="اكتب كلمة من السؤال أو الرد..." oninput="renderList()">

    <div id="qaList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, query, getCountFromServer
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/*
  ================================================================
  قاعدة البيانات الأساسية لتدريب البوت — مشروع مخصص لوحده: train-38762
  (Auth + Firestore الاتنين هنا، عشان الصلاحيات تشتغل صح — التوكن اللي
  بيطلع من تسجيل الدخول هنا بس هو اللي هتفهمه Rules القاعدة دي).
  ================================================================
*/
const firebaseConfig = {
  apiKey: "AIzaSyD121a9FE6wOJQL135I7Sgg5gVLuAmlx10",
  authDomain: "train-38762.firebaseapp.com",
  projectId: "train-38762",
  storageBucket: "train-38762.firebasestorage.app",
  messagingSenderId: "284700909620",
  appId: "1:284700909620:web:61e0e92394a05341bdaa61"
};

/*
  ================================================================
  قاعدة البيانات الاحتياطية (Overflow) — لو train-38762 قربت تمتلئ يومًا ما.
  مشروع Firebase تالت منفصل. لحد ما تتظبط، النظام هيفضل شغال بس على
  train-38762 عادي (الاحتياطية مش هتتفعّل غير لما تحتاجها فعلًا).
  ================================================================
*/
const firebaseConfig2 = {
  apiKey: "PUT_DB2_API_KEY_HERE",
  authDomain: "PUT_DB2_PROJECT_ID_HERE.firebaseapp.com",
  projectId: "PUT_DB2_PROJECT_ID_HERE",
  storageBucket: "PUT_DB2_PROJECT_ID_HERE.firebasestorage.app",
  messagingSenderId: "PUT_DB2_SENDER_ID_HERE",
  appId: "PUT_DB2_APP_ID_HERE"
};

// أقصى عدد أسئلة في القاعدة الأساسية قبل ما نبدأ نكتب في الاحتياطية
// (500 ألف سؤال ≈ ربع الـ 1 جيجا المجانية تقريبًا — هامش أمان كبير عمدًا)
const ENTRY_LIMIT_PER_DB = 500000;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let db2 = null;
try {
  if (firebaseConfig2.apiKey !== "PUT_DB2_API_KEY_HERE") {
    const app2 = initializeApp(firebaseConfig2, "overflow");
    db2 = getFirestore(app2);
  }
} catch (e) {
  console.warn("القاعدة الاحتياطية مش متظبطة لسه:", e);
}

window.doLogin = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  try{
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){
    errEl.textContent = 'بيانات الدخول غلط أو حصل خطأ، جرّب تاني';
    errEl.style.display = 'block';
  }
};

window.doLogout = function(){
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  document.getElementById('loginCard').classList.toggle('hidden', !!user);
  document.getElementById('panelCard').classList.toggle('hidden', !user);
  if(user) startListening();
});

let unsub = null;
let unsub2 = null;
let entriesDb1 = [];
let entriesDb2 = [];
let allEntries = []; // دمج القاعدتين مع بعض، بنفلتره محليًا وقت البحث

function mergeAndRender(){
  allEntries = [...entriesDb1, ...entriesDb2];
  document.getElementById('qaCount').textContent = allEntries.length;
  renderList();
}

function startListening(){
  if(!unsub){
    const q = query(collection(db, 'botKnowledge'), orderBy('createdAt', 'desc'));
    unsub = onSnapshot(q, (snap) => {
      entriesDb1 = snap.docs.map(d => ({ id: d.id, _source: 'db1', ...d.data() }));
      mergeAndRender();
    });
  }
  if(db2 && !unsub2){
    const q2 = query(collection(db2, 'botKnowledge'), orderBy('createdAt', 'desc'));
    unsub2 = onSnapshot(q2, (snap) => {
      entriesDb2 = snap.docs.map(d => ({ id: d.id, _source: 'db2', ...d.data() }));
      mergeAndRender();
    });
  }
}

function renderList(){
  const list = document.getElementById('qaList');
  const term = normalizeSearch(document.getElementById('searchInput')?.value || '');

  const filtered = term
    ? allEntries.filter(e =>
        normalizeSearch(e.patterns || '').includes(term) ||
        normalizeSearch(e.reply || '').includes(term)
      )
    : allEntries;

  if(allEntries.length === 0){
    list.innerHTML = '<p class="sub">لسه مفيش أسئلة مضافة</p>';
    return;
  }
  if(filtered.length === 0){
    list.innerHTML = '<p class="sub">مفيش نتايج مطابقة للبحث</p>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(data => {
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <div>
        <div class="kw">${escapeHtml(data.patterns || '')}</div>
        <div class="rp">${escapeHtml(data.reply || '')}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <button class="btn-logout" style="font-size:12px;">تعديل</button>
        <button class="btn-danger">حذف</button>
      </div>
    `;
    const btns = el.querySelectorAll('button');
    btns[0].onclick = () => startEdit(data);
    btns[1].onclick = () => removeEntry(data.id, data._source);
    list.appendChild(el);
  });
}
window.renderList = renderList;

let editingId = null;
let editingSource = null;

function startEdit(data){
  editingId = data.id;
  editingSource = data._source;
  document.getElementById('patternsInput').value = data.patterns || '';
  document.getElementById('replyInput').value = data.reply || '';
  document.getElementById('saveBtn').textContent = '💾 حفظ التعديل';
  document.getElementById('cancelEditBtn').classList.remove('hidden');
  document.getElementById('patternsInput').scrollIntoView({ behavior: 'smooth' });
}
window.startEdit = startEdit;

window.cancelEdit = function(){
  editingId = null;
  editingSource = null;
  document.getElementById('patternsInput').value = '';
  document.getElementById('replyInput').value = '';
  document.getElementById('saveBtn').textContent = '➕ إضافة';
  document.getElementById('cancelEditBtn').classList.add('hidden');
};

function normalizeSearch(text){
  return text
    .replace(/[إأآا]/g, 'ا')
    .replace(/ة/g, 'ه')
    .replace(/ى/g, 'ي')
    .toLowerCase()
    .trim();
}

window.addEntry = async function(){
  const patterns = document.getElementById('patternsInput').value.trim();
  const reply = document.getElementById('replyInput').value.trim();
  if(!patterns || !reply){ showToast('⚠️ اكتب الكلمات المفتاحية والرد'); return; }

  // وضع التعديل: بنحدّث الـ document الموجود بدل ما نضيف واحد جديد
  if (editingId) {
    const targetDb = editingSource === 'db2' ? db2 : db;
    if (!targetDb) { showToast('⚠️ حصل خطأ، جرّب تاني'); return; }
    await updateDoc(doc(targetDb, 'botKnowledge', editingId), { patterns, reply });
    showToast('✅ اتعدّل بنجاح');
    cancelEdit();
    return;
  }

  // وضع الإضافة العادي
  let targetDb = db;
  let targetLabel = 'الأساسية';
  try {
    const countSnap = await getCountFromServer(collection(db, 'botKnowledge'));
    if (countSnap.data().count >= ENTRY_LIMIT_PER_DB) {
      if (!db2) {
        showToast('⚠️ القاعدة الأساسية قربت تمتلئ ولسه معملتش القاعدة الاحتياطية');
        return;
      }
      targetDb = db2;
      targetLabel = 'الاحتياطية';
    }
  } catch (e) {
    console.warn('تعذر عدّ الأسئلة، هنكتب في القاعدة الأساسية بشكل افتراضي', e);
  }

  await addDoc(collection(targetDb, 'botKnowledge'), {
    patterns, reply, createdAt: Date.now()
  });
  document.getElementById('patternsInput').value = '';
  document.getElementById('replyInput').value = '';
  showToast(targetLabel === 'الأساسية' ? '✅ اتضاف بنجاح' : '✅ اتضاف في القاعدة الاحتياطية');
};

async function removeEntry(id, source){
  const targetDb = source === 'db2' ? db2 : db;
  if(!targetDb) return;
  await deleteDoc(doc(targetDb, 'botKnowledge', id));
  showToast('🗑️ اتحذف');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
window.showToast = showToast;
</script>
</body>
</html>
